<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nerve Workstation</title>
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b22;
    --panel-2: #1c2330;
    --border: #2a3140;
    --text: #e6edf3;
    --muted: #8b95a3;
    --dim: #6b7280;
    --accent: #4f9cf9;
    --accent-press: #3b82e0;
    --ok: #3fb950;
    --warn: #d29922;
    --err: #f85149;
    --reason: #a78bfa;
    --user: #1f6feb;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 15px; font-weight: 650; margin: 0; letter-spacing: 0.2px; }
  header h1 .sub { color: var(--muted); font-weight: 400; margin-left: 8px; font-size: 12px; }
  .status { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.err { background: var(--err); }
  .server-meta { margin-left: auto; font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .server-meta b { color: var(--text); font-weight: 600; }

  main { flex: 1 1 auto; display: flex; min-height: 0; }

  /* ---- Sidebar: tool catalog ---- */
  aside {
    flex: 0 0 320px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .aside-head { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); }
  .aside-head .title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }
  .aside-head .count { color: var(--accent); font-weight: 600; }
  .aside-head input {
    margin-top: 8px; width: 100%; padding: 7px 9px; font-size: 13px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text);
  }
  .tools { overflow-y: auto; padding: 6px; min-height: 0; flex: 1 1 auto; }
  .tool { padding: 8px 10px; border-radius: 6px; border: 1px solid transparent; }
  .tool:hover { background: var(--panel-2); border-color: var(--border); }
  .tool .name { font-family: var(--mono); font-size: 12.5px; color: var(--text); word-break: break-all; }
  .tool .desc { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.4; }
  .badge {
    display: inline-block; font-size: 10px; font-family: var(--mono);
    padding: 1px 6px; border-radius: 999px; margin-right: 6px; vertical-align: middle;
    border: 1px solid var(--border); color: var(--muted);
  }
  .badge.mcp { color: var(--accent); border-color: #284a78; }
  .badge.xai { color: var(--reason); border-color: #443c6e; }

  /* ---- Content shell ---- */
  section.content { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .tabs { flex: 0 0 auto; display: flex; gap: 4px; padding: 8px 14px 0; background: var(--panel); border-bottom: 1px solid var(--border); }
  .tab {
    font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted);
    background: transparent; border: 1px solid transparent; border-bottom: none;
    border-radius: 7px 7px 0 0; padding: 8px 16px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); background: var(--bg); border-color: var(--border); }
  .view { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  .hidden { display: none !important; }

  /* ---- Shared form bits ---- */
  .row { display: flex; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.grow { flex: 1 1 auto; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  input, textarea, select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: var(--sans); font-size: 13.5px; padding: 8px 10px;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; font-family: var(--mono); font-size: 13px; line-height: 1.45; }
  .invalid { border-color: var(--err) !important; }
  details.advanced { margin: 2px 0 0; }
  details.advanced > summary { cursor: pointer; color: var(--muted); font-size: 12px; user-select: none; }
  details.advanced[open] > summary { color: var(--text); }
  .adv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
  .adv-grid .field.span2 { grid-column: span 2; }
  button {
    font-family: var(--sans); font-size: 13.5px; font-weight: 600; cursor: pointer;
    border-radius: 6px; padding: 9px 18px; border: 1px solid transparent;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #06101f; }
  button.primary:not(:disabled):hover { background: var(--accent-press); }
  button.ghost { background: transparent; color: var(--text); border-color: var(--border); }
  button.ghost:not(:disabled):hover { background: var(--panel-2); }
  button.small { padding: 6px 12px; font-size: 12.5px; }
  .hint { color: var(--dim); font-size: 12px; font-family: var(--mono); }

  /* ---- Chat: setup ---- */
  .setup { flex: 0 0 auto; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .setup .row { margin-bottom: 10px; }
  .setup .actions { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
  .setup .actions .hint { margin-left: auto; }

  /* ---- Chat: session bar ---- */
  .session-bar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
    padding: 9px 18px; background: var(--panel); border-bottom: 1px solid var(--border);
    font-size: 12.5px;
  }
  .session-bar .sid { font-family: var(--mono); color: var(--text); }
  .session-bar .meta { color: var(--muted); font-family: var(--mono); }
  .session-bar .spacer { margin-left: auto; }

  /* ---- Chat: transcript ---- */
  .transcript { flex: 1 1 auto; overflow-y: auto; padding: 16px 18px; min-height: 0; }
  .transcript:empty::before {
    content: "Start a session, then send a message to begin chatting.";
    color: var(--dim); font-size: 13px;
  }
  .turn-user { display: flex; justify-content: flex-end; margin: 10px 0; }
  .turn-user .bubble {
    background: var(--user); color: #fff; border-radius: 12px 12px 3px 12px;
    padding: 9px 13px; max-width: 78%; white-space: pre-wrap; word-break: break-word;
    line-height: 1.5; font-size: 13.5px;
  }
  .turn-assistant { margin: 10px 0 18px; max-width: 92%; }
  .turn-head {
    display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
  }
  .turn-head .avatar { color: var(--accent); font-size: 12px; }
  .turn-status { text-transform: none; letter-spacing: 0; color: var(--dim); font-family: var(--mono); font-size: 11px; }
  .turn-status.thinking { color: var(--accent); }
  .turn-status.thinking::after {
    content: ""; display: inline-block; width: 6px; height: 6px; margin-left: 6px;
    border-radius: 50%; background: var(--accent); animation: pulse 1s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .turn-body { display: flex; flex-direction: column; gap: 8px; }

  .blk { white-space: pre-wrap; word-break: break-word; line-height: 1.55; font-size: 13.5px; }
  .blk.msg { color: var(--text); }
  .blk.reason { color: var(--muted); font-style: italic; opacity: 0.9; border-left: 2px solid var(--reason); padding-left: 10px; }
  .blk.sys { font-family: var(--mono); font-size: 12px; color: var(--muted); display: flex; gap: 8px; }
  .blk.sys .tag { color: var(--dim); }
  .blk.sys.ok .txt { color: var(--ok); }
  .blk.sys.warn .txt { color: var(--warn); }
  .blk.sys.err .txt { color: var(--err); }
  .blk.divider { font-family: var(--mono); font-size: 11px; color: var(--dim); border-top: 1px dashed var(--border); padding-top: 6px; }

  /* ---- Tool cards (shared chat + one-shot) ---- */
  .tool-card { border: 1px solid var(--border); border-radius: 8px; background: var(--panel); padding: 9px 11px; }
  .tool-card .role { font-family: var(--mono); font-size: 12.5px; color: var(--text); display: flex; align-items: center; gap: 7px; }
  .tool-card pre {
    margin: 7px 0 0; font-family: var(--mono); font-size: 12px; line-height: 1.45;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; max-height: 280px; overflow: auto; white-space: pre-wrap; word-break: break-word;
  }
  .tool-card pre.out { color: var(--muted); }
  .tool-card.err { border-color: #5b2b2b; }
  .pill { font-size: 10px; font-family: var(--mono); padding: 1px 7px; border-radius: 999px; font-weight: 700; }
  .pill.ok { background: rgba(63,185,80,0.16); color: var(--ok); }
  .pill.err { background: rgba(248,81,73,0.16); color: var(--err); }
  .pill.run { background: rgba(79,156,249,0.16); color: var(--accent); }

  /* ---- Approval card ---- */
  .approval { border: 1px solid #4a3c12; border-radius: 8px; background: rgba(210,153,34,0.08); padding: 10px 12px; }
  .approval .ap-head { font-size: 12px; color: var(--warn); font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .approval .ap-head .verdict { margin-left: auto; font-family: var(--mono); font-size: 11px; }
  .approval pre {
    margin: 8px 0; font-family: var(--mono); font-size: 12px; line-height: 1.45;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; max-height: 180px; overflow: auto; white-space: pre-wrap; word-break: break-word;
  }
  .approval .ap-actions { display: flex; gap: 8px; }
  .approval.allowed { border-color: #234a25; background: rgba(63,185,80,0.06); }
  .approval.allowed .ap-head { color: var(--ok); }
  .approval.denied { border-color: #5b2b2b; background: rgba(248,81,73,0.06); }
  .approval.denied .ap-head { color: var(--err); }
  button.allow { background: var(--ok); color: #06101f; }
  button.deny { background: transparent; color: var(--err); border-color: #5b2b2b; }

  /* ---- Chat: composer ---- */
  .composer-chat { flex: 0 0 auto; padding: 12px 18px; border-top: 1px solid var(--border); background: var(--panel); }
  .composer-chat .crow { display: flex; gap: 10px; align-items: flex-end; }
  .composer-chat textarea { flex: 1 1 auto; min-height: 52px; max-height: 200px; }
  .composer-chat .cbtns { display: flex; flex-direction: column; gap: 8px; }
  .composer-chat .cstatus { display: flex; align-items: center; gap: 7px; margin-top: 8px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
  .composer-chat.disabled { opacity: 0.55; }
  .think-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .think-dot.on { background: var(--accent); animation: pulse 1s infinite ease-in-out; }

  /* ---- One-shot view ---- */
  .composer { flex: 0 0 auto; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .composer .row { margin-bottom: 10px; }
  .composer .actions { display: flex; gap: 10px; align-items: center; }
  .composer .actions .hint { margin-left: auto; }
  .composer textarea { width: 100%; min-height: 64px; }
  .stream { flex: 1 1 auto; overflow-y: auto; padding: 14px 18px; min-height: 0; }
  .stream:empty::before {
    content: "Run a one-shot agent task to stream turns, reasoning, and tool calls here.";
    color: var(--dim); font-size: 13px;
  }
  .stream .turn-assistant { max-width: 1000px; }
  .outcome { flex: 0 0 auto; border-top: 1px solid var(--border); background: var(--panel-2); padding: 14px 18px; max-height: 40%; overflow-y: auto; }
  .outcome.hidden { display: none; }
  .outcome h3 { margin: 0 0 10px; font-size: 13px; }
  .outcome .grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 18px; max-width: 640px; }
  .outcome .grid .k { color: var(--muted); font-size: 12px; font-family: var(--mono); }
  .outcome .grid .v { color: var(--text); font-size: 12.5px; font-family: var(--mono); word-break: break-word; }
  .outcome h4 { margin: 14px 0 6px; font-size: 12px; color: var(--muted); }
  .outcome pre.final {
    margin: 0; font-family: var(--mono); font-size: 12.5px; line-height: 1.5; white-space: pre-wrap;
    word-break: break-word; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
  }
</style>
</head>
<body>
  <header>
    <h1>Nerve Workstation<span class="sub">session chat</span></h1>
    <div class="status"><span id="statusDot" class="dot"></span><span id="statusText">connecting…</span></div>
    <div id="serverMeta" class="server-meta"></div>
  </header>

  <main>
    <aside>
      <div class="aside-head">
        <div class="title">Tools <span id="toolCount" class="count">…</span></div>
        <input id="toolFilter" type="text" placeholder="Filter tools…" autocomplete="off" spellcheck="false">
      </div>
      <div id="tools" class="tools"></div>
    </aside>

    <section class="content">
      <div class="tabs">
        <button class="tab active" data-mode="chat" id="tabChat">Chat</button>
        <button class="tab" data-mode="oneshot" id="tabOneShot">One-shot</button>
      </div>

      <!-- ============ CHAT (primary) ============ -->
      <div id="chatView" class="view">
        <div id="setup" class="setup">
          <div class="row">
            <div class="field grow">
              <label for="provider">Provider</label>
              <input id="provider" type="text" placeholder="anthropic" autocomplete="off" spellcheck="false">
            </div>
            <div class="field grow">
              <label for="model">Model</label>
              <input id="model" type="text" placeholder="claude-sonnet-4" autocomplete="off" spellcheck="false">
            </div>
          </div>
          <details class="advanced">
            <summary>Advanced options</summary>
            <div class="adv-grid">
              <div class="field span2">
                <label for="system">System prompt</label>
                <input id="system" type="text" placeholder="(optional override)" autocomplete="off">
              </div>
              <div class="field span2">
                <label for="agent">Agent</label>
                <input id="agent" type="text" placeholder="(optional named agent)" autocomplete="off" spellcheck="false">
              </div>
              <div class="field">
                <label for="maxTurns">Max turns</label>
                <input id="maxTurns" type="number" min="1" step="1" placeholder="40" autocomplete="off">
              </div>
              <div class="field">
                <label for="effort">Reasoning effort</label>
                <input id="effort" type="text" placeholder="low | medium | high" autocomplete="off">
              </div>
              <div class="field">
                <label for="temp">Temperature</label>
                <input id="temp" type="number" min="0" max="2" step="0.1" placeholder="(default)" autocomplete="off">
              </div>
              <div class="field">
                <label for="resume">Resume (session id)</label>
                <input id="resume" type="text" placeholder="(optional)" autocomplete="off" spellcheck="false">
              </div>
              <div class="field span2">
                <label for="toolFilterIn">Tool filter (comma-separated)</label>
                <input id="toolFilterIn" type="text" placeholder="read_file, file_search" autocomplete="off" spellcheck="false">
              </div>
            </div>
          </details>
          <div class="actions">
            <button id="start" class="primary">Start session</button>
            <span id="startHint" class="hint"></span>
          </div>
        </div>

        <div id="sessionBar" class="session-bar hidden">
          <span class="dot ok"></span>
          <span class="meta" id="sessionModel"></span>
          <span class="sid" id="sessionId"></span>
          <span class="spacer"></span>
          <button id="newSession" class="ghost small">New session</button>
        </div>

        <div id="transcript" class="transcript"></div>

        <div id="composer" class="composer-chat disabled">
          <div class="crow">
            <textarea id="msg" placeholder="Start a session to chat…" disabled></textarea>
            <div class="cbtns">
              <button id="send" class="primary" disabled>Send</button>
              <button id="stop" class="ghost" disabled>Stop</button>
            </div>
          </div>
          <div class="cstatus"><span id="thinkDot" class="think-dot"></span><span id="thinkText">no session</span></div>
        </div>
      </div>

      <!-- ============ ONE-SHOT (secondary) ============ -->
      <div id="oneShotView" class="view hidden">
        <div class="composer">
          <div class="row">
            <div class="field grow">
              <label for="osProvider">Provider</label>
              <input id="osProvider" type="text" placeholder="anthropic" autocomplete="off" spellcheck="false">
            </div>
            <div class="field grow">
              <label for="osModel">Model</label>
              <input id="osModel" type="text" placeholder="claude-sonnet-4" autocomplete="off" spellcheck="false">
            </div>
          </div>
          <div class="row">
            <div class="field grow">
              <label for="osTask">Task</label>
              <textarea id="osTask" placeholder="Describe the one-shot task for the agent…"></textarea>
            </div>
          </div>
          <div class="actions">
            <button id="osRun" class="primary">Run</button>
            <button id="osCancel" class="ghost" disabled>Cancel</button>
            <span id="osHint" class="hint"></span>
          </div>
        </div>
        <div id="osStream" class="stream"></div>
        <div id="osOutcome" class="outcome hidden"></div>
      </div>
    </section>
  </main>

<script>
(function () {
  "use strict";

  // ---- tiny DOM helpers -------------------------------------------------
  const $ = (sel) => document.querySelector(sel);
  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }
  function pretty(v) {
    if (v == null) return "";
    if (typeof v === "string") return v;
    try { return JSON.stringify(v, null, 2); } catch (e) { return String(v); }
  }
  function errText(error) {
    if (!error) return "error";
    return (error.kind ? error.kind + ": " : "") + (error.message || "error");
  }
  function genId(prefix) {
    return prefix + "-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 7);
  }

  // ---- daemon auth token ------------------------------------------------
  // The daemon gates /rpc and /events with a per-run bearer token. On a
  // loopback bind it injects the token below (zero-config local UI); on a
  // remote bind it is supplied via the URL fragment (#token=...), which the
  // browser never sends to the server.
  const DAEMON_TOKEN = (function () {
    const injected = "__NERVE_DAEMON_TOKEN__";
    if (injected.indexOf("NERVE_DAEMON_TOKEN") === -1) return injected;
    const m = /[#&]token=([^&]+)/.exec(window.location.hash || "");
    return m ? decodeURIComponent(m[1]) : "";
  })();
  function authHeaders(base) {
    const h = Object.assign({}, base);
    if (DAEMON_TOKEN) h["Authorization"] = "Bearer " + DAEMON_TOKEN;
    return h;
  }
  function eventsUrl() {
    return DAEMON_TOKEN
      ? "/events?token=" + encodeURIComponent(DAEMON_TOKEN)
      : "/events";
  }

  // ---- JSON-RPC over POST /rpc -----------------------------------------
  let rpcId = 0;
  async function rpc(method, params) {
    const payload = { jsonrpc: "2.0", id: ++rpcId, method: method };
    if (params !== undefined) payload.params = params;
    const res = await fetch("/rpc", {
      method: "POST",
      headers: authHeaders({ "Content-Type": "application/json" }),
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if (json && json.error) {
      throw new Error(json.error.message || ("rpc error " + json.error.code));
    }
    return json ? json.result : undefined;
  }

  function setStatus(state, text) {
    $("#statusDot").className = "dot " + state;
    $("#statusText").textContent = text;
  }

  // ---- unified job registry --------------------------------------------
  // Every operation is a runtime job; we correlate its terminal lifecycle
  // event (job_completed / job_failed / job_cancelled) back to what it was.
  const jobs = new Map(); // job_id -> { kind, id }

  async function startJob(kind, command) {
    const id = genId(kind);
    jobs.set(id, { kind, id });
    try {
      await rpc("runtime/jobs/start", { job_id: id, command });
      return id;
    } catch (e) {
      jobs.delete(id);
      throw e;
    }
  }

  // =======================================================================
  // CHAT (primary surface) — multi-turn session.* over /rpc + /events
  // =======================================================================
  const chat = {
    session: null,        // { id, provider, model } once started
    pending: null,        // { provider, model } captured at session.start
    starting: false,      // a session.start job is in flight
    phase: "idle",        // idle | thinking
    turnEl: null,         // active assistant-turn container
    curMsg: null,         // streaming assistant-text block in the active turn
    curReason: null,      // streaming reasoning block in the active turn
    lastTool: null,       // last tool card awaiting its tool_finished
    approvals: new Map(), // request_id -> { card }
  };

  function transcript() { return $("#transcript"); }
  function autoscroll() {
    const t = transcript();
    if (t.scrollHeight - t.scrollTop - t.clientHeight < 140) t.scrollTop = t.scrollHeight;
  }
  function turnBody() { return chat.turnEl ? chat.turnEl.querySelector(".turn-body") : null; }

  function chatSys(text, cls) {
    const host = turnBody() || transcript();
    const b = el("div", "blk sys " + (cls || ""));
    b.append(el("span", "tag", "•"), el("span", "txt", text));
    host.append(b);
    autoscroll();
  }

  function addUserBubble(text) {
    const wrap = el("div", "turn-user");
    wrap.append(el("div", "bubble", text));
    transcript().append(wrap);
    autoscroll();
  }

  function startAssistantTurn() {
    const turn = el("div", "turn-assistant");
    const head = el("div", "turn-head");
    head.append(el("span", "avatar", "◆"));
    head.append(el("span", "label", "assistant"));
    head.append(el("span", "turn-status thinking", "thinking"));
    turn.append(head);
    turn.append(el("div", "turn-body"));
    transcript().append(turn);
    chat.turnEl = turn;
    chat.curMsg = null;
    chat.curReason = null;
    chat.lastTool = null;
    chat.approvals.clear();
    autoscroll();
  }

  function finalizeTurn() {
    if (chat.turnEl) {
      const s = chat.turnEl.querySelector(".turn-status");
      if (s) { s.className = "turn-status"; s.textContent = ""; }
      // Any approval still pending was abandoned (interrupt / turn end).
      chat.approvals.forEach((a) => markApproval(a.card, "stale"));
      chat.approvals.clear();
    }
    chat.curMsg = null;
    chat.curReason = null;
    chat.lastTool = null;
  }

  function appendAssistantText(text) {
    const body = turnBody();
    if (!body) return;
    if (!chat.curMsg) { chat.curMsg = el("div", "blk msg"); body.append(chat.curMsg); }
    chat.curMsg.textContent += text;
    autoscroll();
  }
  function appendReasoning(text) {
    const body = turnBody();
    if (!body) return;
    if (!chat.curReason) { chat.curReason = el("div", "blk reason"); body.append(chat.curReason); }
    chat.curReason.textContent += text;
    autoscroll();
  }

  function addToolCard(tool, args) {
    const body = turnBody();
    if (!body) return null;
    const card = el("div", "tool-card");
    const role = el("div", "role");
    role.append(el("span", "pill run", "run"));
    role.append(document.createTextNode(" " + (tool || "tool")));
    card.append(role);
    const pre = el("pre", "args");
    pre.textContent = pretty(args);
    card.append(pre);
    body.append(card);
    autoscroll();
    return card;
  }
  function finishToolCard(tool, ok, output) {
    const card = chat.lastTool;
    chat.lastTool = null;
    if (!card) return;
    if (!ok) card.classList.add("err");
    const role = card.querySelector(".role");
    role.textContent = "";
    role.append(el("span", "pill " + (ok ? "ok" : "err"), ok ? "ok" : "error"));
    role.append(document.createTextNode(" " + (tool || "tool")));
    const out = el("pre", "out");
    out.textContent = output || "";
    card.append(out);
    autoscroll();
  }

  // ---- approval prompt ----
  function markApproval(card, state) {
    if (!card) return;
    card.classList.remove("allowed", "denied");
    if (state === "allow") card.classList.add("allowed");
    else if (state === "deny") card.classList.add("denied");
    const verdict = card.querySelector(".verdict");
    if (verdict) verdict.textContent = state === "allow" ? "allowed" : state === "deny" ? "denied" : "(closed)";
    card.querySelectorAll("button").forEach((b) => { b.disabled = true; });
  }

  function addApprovalCard(requestId, tool, args) {
    const body = turnBody();
    if (!body) return;
    const card = el("div", "approval");
    const head = el("div", "ap-head");
    head.append(el("span", null, "⚠ approval requested · " + (tool || "tool")));
    head.append(el("span", "verdict", "pending"));
    card.append(head);
    const pre = el("pre", null, pretty(args));
    card.append(pre);
    const actions = el("div", "ap-actions");
    const allow = el("button", "allow small", "Allow");
    const deny = el("button", "deny small", "Deny");
    allow.addEventListener("click", () => respond(requestId, "allow", card));
    deny.addEventListener("click", () => respond(requestId, "deny", card));
    actions.append(allow, deny);
    card.append(actions);
    body.append(card);
    chat.approvals.set(requestId, { card });
    autoscroll();
  }

  async function respond(requestId, decision, card) {
    markApproval(card, decision);
    chat.approvals.delete(requestId);
    try {
      await startJob("respond", {
        kind: "session.respond",
        session_id: chat.session.id,
        request_id: requestId,
        decision: decision,
      });
    } catch (e) {
      chatSys("respond failed: " + e.message, "err");
    }
  }

  // ---- chat control state ----
  function refreshChatControls() {
    const haveSession = !!chat.session;
    const thinking = chat.phase === "thinking";
    $("#msg").disabled = !haveSession;
    $("#send").disabled = !haveSession || thinking;
    $("#stop").disabled = !thinking;
    $("#composer").classList.toggle("disabled", !haveSession);
    $("#start").disabled = chat.starting;
    const dot = $("#thinkDot");
    dot.className = "think-dot" + (thinking ? " on" : "");
    $("#thinkText").textContent = !haveSession ? "no session" : thinking ? "thinking…" : "ready";
    if (!haveSession) $("#msg").placeholder = "Start a session to chat…";
    else $("#msg").placeholder = "Message… (Enter to send, Shift+Enter for newline)";
  }

  function setThinking(on) {
    chat.phase = on ? "thinking" : "idle";
    if (!on && chat.turnEl) {
      const s = chat.turnEl.querySelector(".turn-status");
      if (s) { s.className = "turn-status"; s.textContent = ""; }
    }
    refreshChatControls();
  }

  function markInvalid(node, bad) { node.classList.toggle("invalid", bad); }

  // ---- start a session ----
  async function startSession() {
    if (chat.starting || chat.session) return;
    const provider = $("#provider").value.trim();
    const model = $("#model").value.trim();
    markInvalid($("#provider"), !provider);
    markInvalid($("#model"), !model);
    if (!provider || !model) { $("#startHint").textContent = "provider and model are required"; return; }

    const command = { kind: "session.start", provider: provider, model: model };
    const sysP = $("#system").value.trim(); if (sysP) command.system_prompt = sysP;
    const agentN = $("#agent").value.trim(); if (agentN) command.agent = agentN;
    const resume = $("#resume").value.trim(); if (resume) command.resume = resume;
    const mt = $("#maxTurns").value.trim(); if (mt) { const n = parseInt(mt, 10); if (!isNaN(n)) command.max_turns = n; }
    const temp = $("#temp").value.trim(); if (temp) { const f = parseFloat(temp); if (!isNaN(f)) command.temperature = f; }
    const effort = $("#effort").value.trim(); if (effort) command.reasoning_effort = effort;
    const tf = $("#toolFilterIn").value.trim();
    if (tf) { const list = tf.split(",").map((s) => s.trim()).filter(Boolean); if (list.length) command.tool_filter = list; }

    chat.starting = true;
    chat.pending = { provider, model };
    $("#startHint").textContent = "starting…";
    refreshChatControls();
    try {
      await startJob("start", command);
    } catch (e) {
      chat.starting = false;
      $("#startHint").textContent = "failed: " + e.message;
      refreshChatControls();
    }
  }

  function adoptSession(id) {
    chat.session = { id: id, provider: chat.pending ? chat.pending.provider : "", model: chat.pending ? chat.pending.model : "" };
    chat.starting = false;
    $("#startHint").textContent = "";
    $("#setup").classList.add("hidden");
    $("#sessionBar").classList.remove("hidden");
    $("#sessionModel").textContent = chat.session.provider + " / " + chat.session.model;
    $("#sessionId").textContent = id;
    refreshChatControls();
    $("#msg").focus();
  }

  function resetChat() {
    chat.session = null;
    chat.pending = null;
    chat.starting = false;
    chat.phase = "idle";
    chat.turnEl = null;
    chat.curMsg = null;
    chat.curReason = null;
    chat.lastTool = null;
    chat.approvals.clear();
    transcript().textContent = "";
    $("#setup").classList.remove("hidden");
    $("#sessionBar").classList.add("hidden");
    $("#startHint").textContent = "";
    refreshChatControls();
  }

  // ---- send a message ----
  async function send() {
    if (!chat.session || chat.phase === "thinking") return;
    const text = $("#msg").value.trim();
    if (!text) return;
    $("#msg").value = "";
    addUserBubble(text);
    startAssistantTurn();
    setThinking(true);
    try {
      await startJob("message", { kind: "session.message", session_id: chat.session.id, text: text });
    } catch (e) {
      chatSys("failed to send: " + e.message, "err");
      setThinking(false);
    }
  }

  async function interrupt() {
    if (!chat.session) return;
    try {
      await startJob("interrupt", { kind: "session.interrupt", session_id: chat.session.id });
      chatSys("⏹ interrupt requested", "warn");
    } catch (e) {
      chatSys("interrupt failed: " + e.message, "err");
    }
  }

  async function newSession() {
    if (chat.session) {
      try { await startJob("close", { kind: "session.close", session_id: chat.session.id }); } catch (e) { /* best effort */ }
    }
    resetChat();
  }

  // ---- session event handling ----
  function isCurrent(sessionId) { return chat.session && sessionId === chat.session.id; }

  function onSessionStarted(sessionId) {
    // Bootstrapping event: adopt while a start is in flight and unclaimed.
    if (chat.starting && !chat.session) adoptSession(sessionId);
  }
  function onTurnStarted(sessionId) {
    if (!isCurrent(sessionId)) return;
    if (!chat.turnEl) startAssistantTurn();
    setThinking(true);
  }
  function onSessionIdle(sessionId) {
    if (!isCurrent(sessionId)) return;
    finalizeTurn();
    setThinking(false);
  }
  function onSessionClosed(sessionId) {
    if (!isCurrent(sessionId)) return;
    chatSys("session closed", "warn");
    resetChat();
  }
  function onApprovalRequested(ev) {
    if (!isCurrent(ev.session_id)) return;
    if (!chat.turnEl) startAssistantTurn();
    addApprovalCard(ev.request_id, ev.tool, ev.arguments);
  }
  function onSessionAgent(sessionId, a) {
    if (!isCurrent(sessionId)) return;
    if (!chat.turnEl) startAssistantTurn();
    switch (a.kind) {
      case "turn_started":
        chat.curMsg = null; chat.curReason = null;
        if (a.turn && a.turn > 1) turnBody().append(el("div", "blk divider", "step " + a.turn));
        break;
      case "message": chat.curReason = null; appendAssistantText(a.text || ""); break;
      case "reasoning": chat.curMsg = null; appendReasoning(a.text || ""); break;
      case "tool_started":
        chat.curMsg = null; chat.curReason = null;
        chat.lastTool = addToolCard(a.tool, a.arguments);
        break;
      case "tool_finished":
        chat.curMsg = null; chat.curReason = null;
        finishToolCard(a.tool, !!a.ok, a.output);
        break;
      case "interrupted":
        chat.curMsg = null; chat.curReason = null;
        chatSys("interrupted: " + (a.reason || ""), "warn");
        break;
      default: break;
    }
  }

  // ---- chat job terminals ----
  function chatStartTerminal(job, kind, error) {
    if (kind === "completed") {
      // session_started normally already adopted the id; fall back to the result.
      if (!chat.session) {
        rpc("runtime/jobs/get", { job_id: job.id, include_result: true })
          .then((r) => { const id = r && r.job && r.job.result && r.job.result.session_id; if (id) adoptSession(id); })
          .catch(() => {});
      }
      return;
    }
    chat.starting = false;
    $("#startHint").textContent = "session.start " + kind + (error ? ": " + errText(error) : "");
    refreshChatControls();
  }
  function chatMessageTerminal(kind, error) {
    setThinking(false);
    finalizeTurn();
    if (kind === "failed" && error) chatSys("× turn failed · " + errText(error), "err");
    else if (kind === "cancelled") chatSys("turn cancelled", "warn");
  }

  // =======================================================================
  // ONE-SHOT (secondary surface) — agent.run jobs
  // =======================================================================
  const one = { jobId: null, running: false, turnEl: null, curMsg: null, curReason: null, lastTool: null };

  function osStream() { return $("#osStream"); }
  function osScroll() { const s = osStream(); if (s.scrollHeight - s.scrollTop - s.clientHeight < 120) s.scrollTop = s.scrollHeight; }
  function osTurn() { return one.turnEl ? one.turnEl.querySelector(".turn-body") : null; }
  function osSys(text, cls) {
    const host = osTurn() || osStream();
    const b = el("div", "blk sys " + (cls || ""));
    b.append(el("span", "tag", "•"), el("span", "txt", text));
    host.append(b); osScroll();
  }
  function osNewTurn(n) {
    const turn = el("div", "turn-assistant");
    const head = el("div", "turn-head");
    head.append(el("span", "avatar", "◆"));
    head.append(el("span", "label", "turn " + n));
    turn.append(head); turn.append(el("div", "turn-body"));
    osStream().append(turn);
    one.turnEl = turn; one.curMsg = null; one.curReason = null; one.lastTool = null;
    osScroll();
  }
  function osText(text) {
    const body = osTurn(); if (!body) { osNewTurn(1); }
    if (!one.curMsg) { one.curMsg = el("div", "blk msg"); osTurn().append(one.curMsg); }
    one.curMsg.textContent += text; osScroll();
  }
  function osReason(text) {
    const body = osTurn(); if (!body) { osNewTurn(1); }
    if (!one.curReason) { one.curReason = el("div", "blk reason"); osTurn().append(one.curReason); }
    one.curReason.textContent += text; osScroll();
  }
  function osToolStart(tool, args) {
    const body = osTurn(); if (!body) osNewTurn(1);
    const card = el("div", "tool-card");
    const role = el("div", "role");
    role.append(el("span", "pill run", "run"));
    role.append(document.createTextNode(" " + (tool || "tool")));
    card.append(role);
    const pre = el("pre", "args"); pre.textContent = pretty(args); card.append(pre);
    osTurn().append(card); one.lastTool = card; osScroll();
  }
  function osToolFinish(tool, ok, output) {
    const card = one.lastTool; one.lastTool = null;
    if (!card) return;
    if (!ok) card.classList.add("err");
    const role = card.querySelector(".role"); role.textContent = "";
    role.append(el("span", "pill " + (ok ? "ok" : "err"), ok ? "ok" : "error"));
    role.append(document.createTextNode(" " + (tool || "tool")));
    const out = el("pre", "out"); out.textContent = output || ""; card.append(out); osScroll();
  }

  function osSetRunning(on) {
    one.running = on;
    $("#osRun").disabled = on;
    $("#osCancel").disabled = !on;
    $("#osRun").textContent = on ? "Running…" : "Run";
  }
  function osHideOutcome() { const o = $("#osOutcome"); o.classList.add("hidden"); o.textContent = ""; }

  async function osRunTask() {
    if (one.running) return;
    const provider = $("#osProvider").value.trim();
    const model = $("#osModel").value.trim();
    const task = $("#osTask").value.trim();
    markInvalid($("#osProvider"), !provider);
    markInvalid($("#osModel"), !model);
    markInvalid($("#osTask"), !task);
    if (!provider || !model || !task) { $("#osHint").textContent = "provider, model, and task are required"; return; }

    osStream().textContent = ""; one.turnEl = null; osHideOutcome();
    osSetRunning(true);
    const command = { kind: "agent.run", provider: provider, model: model, task: task };
    osSys("starting agent.run · " + provider + " / " + model);
    try {
      one.jobId = await startJob("oneshot", command);
      $("#osHint").textContent = one.jobId;
    } catch (e) {
      osSys("failed to start: " + e.message, "err");
      osSetRunning(false);
    }
  }
  async function osCancelTask() {
    if (!one.jobId) return;
    try { await rpc("runtime/jobs/cancel", { job_id: one.jobId }); osSys("cancel requested", "warn"); }
    catch (e) { osSys("cancel failed: " + e.message, "err"); }
  }
  function onOneShotAgent(jobId, a) {
    if (jobId !== one.jobId) return;
    switch (a.kind) {
      case "turn_started": osNewTurn(a.turn); break;
      case "message": one.curReason = null; osText(a.text || ""); break;
      case "reasoning": one.curMsg = null; osReason(a.text || ""); break;
      case "tool_started": one.curMsg = null; one.curReason = null; osToolStart(a.tool, a.arguments); break;
      case "tool_finished": one.curMsg = null; one.curReason = null; osToolFinish(a.tool, !!a.ok, a.output); break;
      case "interrupted": osSys("interrupted: " + (a.reason || ""), "warn"); break;
      default: break;
    }
  }
  async function osTerminal(kind, error) {
    if (error) osSys("job failed · " + errText(error), "err");
    else osSys("job " + kind, kind === "completed" ? "ok" : "warn");
    osSetRunning(false);
    if (!one.jobId) return;
    try {
      const r = await rpc("runtime/jobs/get", { job_id: one.jobId, include_result: true });
      if (r && r.job) osRenderOutcome(r.job);
    } catch (e) { osSys("could not fetch result: " + e.message, "err"); }
  }
  function osRenderOutcome(job) {
    const o = $("#osOutcome");
    o.textContent = ""; o.classList.remove("hidden");
    o.append(el("h3", null, "Outcome"));
    const grid = el("div", "grid");
    const add = (k, v) => { grid.append(el("div", "k", k), el("div", "v", v == null ? "—" : String(v))); };
    add("status", job.status);
    const r = job.result || {};
    if (job.error) add("error", errText(job.error));
    if (r.reason != null) add("reason", r.reason);
    if (r.turns != null) add("turns", r.turns);
    if (r.usage) { add("input tokens", r.usage.input_tokens); add("output tokens", r.usage.output_tokens); }
    o.append(grid);
    if (r.final_text) {
      o.append(el("h4", null, "Final text"));
      const pre = el("pre", "final"); pre.textContent = r.final_text; o.append(pre);
    }
  }

  // =======================================================================
  // Shared event dispatch (SSE) — route by event type, then by id
  // =======================================================================
  function onJobTerminal(jobId, kind, error) {
    const job = jobs.get(jobId);
    if (!job) return;
    jobs.delete(jobId);
    switch (job.kind) {
      case "oneshot": osTerminal(kind, error); break;
      case "start": chatStartTerminal(job, kind, error); break;
      case "message": chatMessageTerminal(kind, error); break;
      case "respond":
      case "interrupt":
      case "close":
        if (kind !== "completed" && error) chatSys("× " + job.kind + " failed: " + errText(error), "err");
        break;
      default: break;
    }
  }

  function handleEvent(ev) {
    if (!ev || typeof ev !== "object") return;
    switch (ev.type) {
      // job lifecycle (carry job_id)
      case "job_started": break;
      case "job_progress": break;
      case "job_cancel_requested": break;
      case "job_completed": onJobTerminal(ev.job_id, "completed", null); break;
      case "job_failed": onJobTerminal(ev.job_id, "failed", ev.error); break;
      case "job_cancelled": onJobTerminal(ev.job_id, "cancelled", null); break;
      // one-shot agent steps (carry job_id)
      case "agent": onOneShotAgent(ev.job_id, ev.event || {}); break;
      // session lifecycle + steps (carry session_id)
      case "session_started": onSessionStarted(ev.session_id); break;
      case "turn_started": onTurnStarted(ev.session_id); break;
      case "session_idle": onSessionIdle(ev.session_id); break;
      case "session_closed": onSessionClosed(ev.session_id); break;
      case "session_agent": onSessionAgent(ev.session_id, ev.event || {}); break;
      case "approval_requested": onApprovalRequested(ev); break;
      default: break;
    }
  }

  function connectEvents() {
    let es;
    try { es = new EventSource(eventsUrl()); }
    catch (e) { setStatus("err", "events unavailable"); return; }
    es.onopen = () => setStatus("ok", "connected");
    es.onerror = () => setStatus("warn", "reconnecting…");
    es.onmessage = (e) => {
      let note;
      try { note = JSON.parse(e.data); } catch (err) { return; }
      if (!note || note.method !== "runtime/event") return;
      handleEvent(note.params || {});
    };
  }

  // =======================================================================
  // Info + tool catalog
  // =======================================================================
  function renderInfo(info) {
    if (!info) return;
    const name = (info.serverInfo && info.serverInfo.name) || "nerve";
    const version = (info.serverInfo && info.serverInfo.version) || "?";
    const proto = info.protocolVersion || "?";
    const meta = $("#serverMeta");
    meta.textContent = "";
    meta.append(el("b", null, name + " v" + version));
    meta.append(document.createTextNode("  ·  protocol v" + proto));
    const kinds = info.capabilities && info.capabilities.jobs && info.capabilities.jobs.commandKinds;
    if (Array.isArray(kinds) && kinds.indexOf("session.start") === -1) {
      setStatus("warn", "daemon lacks session.start");
    }
  }

  let allTools = [];
  function nsBadge(name) {
    if (name.indexOf("mcp__") === 0) return { cls: "mcp", text: "mcp" };
    if (name.indexOf("xai_") === 0 || name.indexOf("xai__") === 0) return { cls: "xai", text: "xai" };
    return null;
  }
  function renderTools(tools) {
    allTools = Array.isArray(tools) ? tools : [];
    $("#toolCount").textContent = "(" + allTools.length + ")";
    paintTools("");
  }
  function paintTools(filter) {
    const host = $("#tools");
    host.textContent = "";
    const f = filter.toLowerCase();
    let shown = 0;
    for (const t of allTools) {
      const name = t.name || "";
      const desc = t.description || "";
      if (f && (name + " " + desc).toLowerCase().indexOf(f) === -1) continue;
      shown++;
      const item = el("div", "tool");
      const nameEl = el("div", "name");
      const badge = nsBadge(name);
      if (badge) nameEl.append(el("span", "badge " + badge.cls, badge.text));
      nameEl.append(document.createTextNode(name));
      item.append(nameEl);
      if (desc) {
        const d = desc.length > 220 ? desc.slice(0, 217) + "…" : desc;
        item.append(el("div", "desc", d));
      }
      item.title = desc;
      host.append(item);
    }
    if (shown === 0) host.append(el("div", "tool", allTools.length ? "No tools match the filter." : "No tools reported."));
  }

  // ---- mode tabs ----
  function setMode(mode) {
    const chatOn = mode === "chat";
    $("#tabChat").classList.toggle("active", chatOn);
    $("#tabOneShot").classList.toggle("active", !chatOn);
    $("#chatView").classList.toggle("hidden", !chatOn);
    $("#oneShotView").classList.toggle("hidden", chatOn);
  }

  // =======================================================================
  // init + wire up
  // =======================================================================
  async function init() {
    connectEvents();
    refreshChatControls();
    try { renderInfo(await rpc("runtime/info")); }
    catch (e) { setStatus("err", "rpc error"); }
    try { const res = await rpc("runtime/tools/list"); renderTools(res && res.tools); }
    catch (e) { $("#toolCount").textContent = "(error)"; }
  }

  $("#start").addEventListener("click", startSession);
  $("#send").addEventListener("click", send);
  $("#stop").addEventListener("click", interrupt);
  $("#newSession").addEventListener("click", newSession);
  $("#msg").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  $("#osRun").addEventListener("click", osRunTask);
  $("#osCancel").addEventListener("click", osCancelTask);
  $("#osTask").addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); osRunTask(); }
  });
  $("#toolFilter").addEventListener("input", (e) => paintTools(e.target.value || ""));
  $("#tabChat").addEventListener("click", () => setMode("chat"));
  $("#tabOneShot").addEventListener("click", () => setMode("oneshot"));

  init();
})();
</script>
</body>
</html>
