name: windows

# Builds and tests nerve-workstation on Windows and attaches nerve.exe to the release.
# Fires when a release is published (e.g. by Scripts/release.sh) and can also be
# dispatched manually against an existing tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach nerve.exe to (e.g. v0.0.9)"
        required: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          rustc --version

      - name: Clippy
        shell: bash
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: File-size gate
        shell: bash
        run: bash Scripts/check-file-size.sh --strict

      # The nerve-tui smoke test spawns the debug `nerve` binary; build it before
      # the suite runs (the later release build is a different profile + target).
      - name: Build the nerve binary (the nerve-tui smoke test spawns it)
        shell: bash
        run: cargo build -p nerve-workstation --bin nerve

      - name: Test
        shell: bash
        run: cargo test --workspace

      - name: Build release binary
        shell: bash
        run: |
          cargo build --release -p nerve-workstation
          ./target/release/nerve.exe --version

      - name: Upload nerve.exe + sha256 to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ "$tag" == v* ]] && gh release view "$tag" -R z23cc/nerve-workstation >/dev/null 2>&1; then
            sha="$(sha256sum target/release/nerve.exe | cut -d' ' -f1)"
            echo "$sha  nerve.exe" > nerve.exe.sha256
            echo ">> nerve.exe sha256: $sha"
            gh release upload "$tag" target/release/nerve.exe nerve.exe.sha256 \
              -R z23cc/nerve-workstation --clobber
          else
            echo "no release for '$tag' — build/test verification only, skipping upload"
          fi

      - name: Update scoop bucket
        if: ${{ startsWith(github.event.release.tag_name || inputs.tag, 'v') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SCOOP_DEPLOY_KEY: ${{ secrets.SCOOP_DEPLOY_KEY }}
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          gh release view "$tag" -R z23cc/nerve-workstation >/dev/null 2>&1 || { echo "no release $tag; skipping scoop"; exit 0; }
          ver="${tag#v}"
          sha="$(sha256sum target/release/nerve.exe | cut -d' ' -f1)"
          mkdir -p ~/.ssh
          printf '%s\n' "$SCOOP_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone git@github.com:z23cc/scoop-bucket.git bucket-repo
          mkdir -p bucket-repo/bucket
          python - "$ver" "$tag" "$sha" >bucket-repo/bucket/nerve-workstation.json <<'PY'
          import json, sys
          ver, tag, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          base = "https://github.com/z23cc/nerve-workstation/releases/download"
          manifest = {
              "version": ver,
              "description": "Local AI workstation runtime and MCP adapter",
              "homepage": "https://github.com/z23cc/nerve-workstation",
              "license": "MIT OR Apache-2.0",
              "architecture": {"64bit": {"url": f"{base}/{tag}/nerve.exe", "hash": sha}},
              "bin": "nerve.exe",
              "checkver": "github",
              "autoupdate": {"architecture": {"64bit": {"url": base + "/v$version/nerve.exe"}}},
          }
          print(json.dumps(manifest, indent=2))
          PY
          cd bucket-repo
          git add bucket/nerve-workstation.json
          git commit -m "nerve-workstation $ver" || { echo "no change"; exit 0; }
          git branch -M main
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" git push -u origin main
