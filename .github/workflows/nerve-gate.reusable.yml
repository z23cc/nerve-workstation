# Reusable Nerve verification-receipt merge gate.
#
# Another repository gates a PR on a Nerve Verification Receipt with one job:
#
#   jobs:
#     nerve-gate:
#       uses: z23cc/nerve-workstation/.github/workflows/nerve-gate.reusable.yml@main
#       with:
#         run-id: ${{ needs.delegate.outputs.run-id }}
#       secrets: inherit
#
# This wraps the composite action at .github/actions/nerve-gate. See
# docs/integrations/ci-merge-gate.md for the adopter walkthrough and
# docs/designs/trust-substrate.md §L4/§L5/§8 for what a Receipt is.
#
# POST-MERGE OUTCOME (opt-in, L6) — the gate above runs BEFORE merge. To also feed the
# cross-agent outcome corpus with the REAL post-merge disposition, add a SEPARATE opt-in
# job in your repo that runs when a PR actually merges and records it (advisory; NEVER a
# gate — INV-R1/R3/R4). `nerve outcome` is the offline twin of the daemon `outcome.label`:
#
#   on:
#     pull_request:
#       types: [closed]
#   jobs:
#     record-outcome:
#       if: github.event.pull_request.merged == true   # only a real merge, not just close
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#         # install `nerve` (pinned release or `cargo install`) …
#         - run: nerve outcome merged --run "$NERVE_RUN_ID" --source ci --root .
#
# Nerve records what the CALLER asserts happened (the platform merged it); it never
# invents an outcome or derives one from a verify verdict. See
# docs/integrations/ci-merge-gate.md → "Feeding the outcome corpus (L6)".
name: Nerve gate (reusable)

on:
  workflow_call:
    inputs:
      run-id:
        description: Captured Run id (content address) to verify and gate on.
        required: true
        type: string
      root:
        description: Repo root whose `.nerve/` store holds the Run, checks.json and receipts.
        required: false
        type: string
        default: "."
      emit:
        description: "Check-run emitter: `gh` (post a GitHub check-run) or `none`."
        required: false
        type: string
        default: "gh"
      nerve-version:
        description: Release tag of the `nerve` binary to install, or `latest`.
        required: false
        type: string
        default: "latest"
      reruns:
        description: Optional `--reruns N` for flaky-test detection (empty = default).
        required: false
        type: string
        default: ""
      install-command:
        description: Escape hatch — exact shell command to install `nerve` instead of the default.
        required: false
        type: string
        default: ""
      runs-on:
        description: Runner label for the gate job.
        required: false
        type: string
        default: ubuntu-latest

# Least privilege: read the tree, write the check-run + PR status.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  nerve-gate:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nerve verification-receipt gate
        uses: z23cc/nerve-workstation/.github/actions/nerve-gate@main
        env:
          # Surfaced to the composite action's gh-emit/auth steps.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          run-id: ${{ inputs.run-id }}
          root: ${{ inputs.root }}
          emit: ${{ inputs.emit }}
          nerve-version: ${{ inputs.nerve-version }}
          reruns: ${{ inputs.reruns }}
          install-command: ${{ inputs.install-command }}
