name: CI

# The objective backstop on main: the heavy correctness gates (clippy -D warnings
# + the full workspace test suite) that need the compile. The fast, deterministic
# gates (fmt, file-size, version + dist SRI consistency) also run locally via the
# Scripts/git-hooks/pre-push hook, so a trivial failure aborts the push before it
# ever costs a CI minute. Doc-only (*.md) changes skip the heavy compile, and the
# RUSTSEC advisory audit runs on its own schedule (audit.yml), not every push.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy
          rustup target add wasm32-unknown-unknown
          rustc --version

      # Cache the cargo registry + target dir (the 11 tree-sitter grammars compile
      # parser.c, so a cold build is slow).
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (-D warnings, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Gate the wasm32 frontend (nerve-gui is wasm-only; the host clippy above
      # checks it on the host target, but wasm-specific API breakage only shows up
      # when compiled for wasm32 — which nothing else in CI does).
      - name: Clippy frontend (wasm32)
        run: cargo clippy -p nerve-gui --target wasm32-unknown-unknown -- -D warnings

      - name: File-size gate (<= 600 non-test lines)
        run: bash Scripts/check-file-size.sh --strict

      # The nerve-tui smoke test (crates/nerve-tui/tests/smoke.rs) spawns a real
      # `nerve daemon` from target/<profile>/nerve. `cargo test` builds the bin's
      # test harness into deps/ but does NOT emit the runnable named binary, so
      # build it explicitly first (incremental — shares the test compile's cache).
      - name: Build the nerve binary (the nerve-tui smoke test spawns it)
        run: cargo build -p nerve-workstation --bin nerve

      - name: Test (whole workspace)
        run: cargo test --workspace
        # Runtime-protocol drift is already asserted by the
        # `generated_protocol_rust_artifacts_are_current` test in nerve-runtime
        # (run here), so a separate `export-runtime-protocol --check` step would
        # only recompile the bin to repeat a check the suite already made.
