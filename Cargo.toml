[workspace]
members = ["crates/ctx-core", "crates/ctx-mcp", "crates/ctx-ffi", "crates/ctx-wasm"]
exclude = ["fuzz"]
resolver = "3"

[workspace.package]
version = "0.0.3"
edition = "2024"
rust-version = "1.95"
license = "MIT OR Apache-2.0"
repository = "https://github.com/z23cc/context-engine-rs"

[workspace.dependencies]
anyhow = "1"
aho-corasick = "1"
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
memchr = "2"
nucleo-matcher = "0.3.1"
regex = "1"
rayon = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }
syn = { version = "2", features = ["full", "printing", "extra-traits", "visit"] }
quote = "1"
oxc_parser = "0.135.0"
oxc_ast = "0.135.0"
oxc_span = "0.135.0"
oxc_allocator = "0.135.0"
ruff_python_parser = { version = "0.15.8", package = "rustpython-ruff_python_parser" }
ruff_python_ast = { version = "0.15.8", package = "rustpython-ruff_python_ast" }
ruff_text_size = { version = "0.15.8", package = "rustpython-ruff_text_size" }
thiserror = "2"
tempfile = "3"
insta = { version = "1", features = ["json", "redactions"] }
criterion = { version = "0.5", default-features = false }
proptest = "1"
tiktoken-rs = { version = "0.12.0", default-features = false }
wasm-bindgen = "0.2"
