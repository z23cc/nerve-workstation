# Drop-in GitLab CI merge gate on a Nerve Verification Receipt.
#
# A court reporter, not a judge (INV-R1): `nerve verify` re-runs the org's OWN
# checks (<root>/.nerve/checks.json) against a captured Run and seals a signed
# Receipt; `nerve gate` maps that Receipt to the authoritative pipeline exit code
# (0 pass / 1 fail / 2 inconclusive). If checks.json is absent the verdict is
# Inconclusive (exit 2) — a pass is NEVER fabricated.
#
# Usage — in a consumer .gitlab-ci.yml:
#
#   include:
#     - project: 'your-group/nerve-workstation'
#       file: '/templates/gitlab/nerve-gate.gitlab-ci.yml'
#
#   nerve-gate:
#     extends: .nerve-gate
#     variables:
#       NERVE_RUN_ID: "$NERVE_RUN_ID"   # the captured Run id from a delegated nerve run
#
# NOTE: this gates on the EXIT CODE, which is a complete merge gate on its own. It
# ALSO posts a GitLab *commit status* (the `nerve-gate` context, the equivalent of
# the GitHub `--emit gh` check-run) via the Commit Status API: GitLab injects
# CI_API_V4_URL + CI_JOB_TOKEN + CI_PROJECT_ID + CI_COMMIT_SHA automatically. The
# posted status only MIRRORS the exit code — an un-cleared verdict posts `failed`,
# never `success` (INV-R1) — and the exit code remains authoritative.

.nerve-gate:
  stage: test
  # Pick an image that has either a prebuilt `nerve` on PATH or a Rust toolchain
  # for the `cargo install` fallback. Override `NERVE_INSTALL` to fully customise.
  image: "rust:latest"
  variables:
    NERVE_RUN_ID: ""          # REQUIRED — captured Run id (content address).
    NERVE_ROOT: "."           # repo root whose `.nerve/` store holds the Run.
    NERVE_RERUNS: ""          # optional `--reruns N` for flaky detection.
    NERVE_REPO: "z23cc/nerve-workstation"
    # Override to swap the install step (e.g. download a pinned release binary).
    NERVE_INSTALL: >-
      if command -v nerve >/dev/null 2>&1; then :;
      elif [ -f Cargo.toml ] && grep -q nerve-workstation Cargo.toml; then
        cargo install --path crates/nerve-workstation --bin nerve --locked --force;
      else
        cargo install nerve-workstation --bin nerve --locked --force;
      fi
  script:
    - set -euo pipefail
    - test -n "$NERVE_RUN_ID" || { echo "NERVE_RUN_ID is required"; exit 1; }
    - eval "$NERVE_INSTALL"
    - command -v nerve >/dev/null 2>&1 || { echo "nerve not installed"; exit 1; }
    - nerve --version || true
    # (b) Re-run the org's own checks and seal the Receipt. Do not abort here; the
    #     gate step below is the single authoritative exit.
    - |
      VERIFY_ARGS="verify $NERVE_RUN_ID --root $NERVE_ROOT"
      if [ -n "$NERVE_RERUNS" ]; then VERIFY_ARGS="$VERIFY_ARGS --reruns $NERVE_RERUNS"; fi
      echo "+ nerve $VERIFY_ARGS"
      nerve $VERIFY_ARGS || echo "nerve verify exited non-zero (gate step decides)."
    # (c) Gate on the sealed Receipt. `--emit gitlab` posts a `nerve-gate` commit
    #     status (auth: CI_JOB_TOKEN, or set GITLAB_TOKEN as a masked CI variable for a
    #     PRIVATE-TOKEN) that mirrors the exit code; the exit code remains authoritative
    #     and gates the job.
    - |
      echo "+ nerve gate --run $NERVE_RUN_ID --root $NERVE_ROOT --emit gitlab --repo $CI_PROJECT_ID --sha $CI_COMMIT_SHA"
      nerve gate --run "$NERVE_RUN_ID" --root "$NERVE_ROOT" --emit gitlab --repo "$CI_PROJECT_ID" --sha "$CI_COMMIT_SHA"

# Post-merge OUTCOME ingestion (opt-in, L6). The gate above runs BEFORE merge; this
# records the REAL post-merge disposition into the cross-agent outcome corpus AND mirrors
# it onto the L1 evidence ledger (`OutcomeRecorded`). It is ADVISORY — never a gate, never
# an input to a verdict/receipt (INV-R1/R3/R4). `nerve outcome` records what the CALLER
# asserts happened (the merge pipeline merged it); it never invents an outcome or derives
# one from a verify verdict. Default rule fires on the default-branch push a merge produces.
#
# Usage — in a consumer .gitlab-ci.yml:
#
#   nerve-outcome:
#     extends: .nerve-outcome
#     variables:
#       NERVE_RUN_ID: "$NERVE_RUN_ID"   # the captured Run id from a delegated nerve run
#       # NERVE_OUTCOME: "merged"       # or "reverted" in a revert pipeline
#       # NERVE_RECEIPT: "$RECEIPT_ID"  # optional, denormalized onto the corpus for query
.nerve-outcome:
  stage: test
  image: "rust:latest"
  variables:
    NERVE_RUN_ID: ""               # REQUIRED — captured Run id (content address).
    NERVE_OUTCOME: "merged"        # merged | reverted | incident | shipped-no-regress.
    NERVE_RECEIPT: ""              # optional receipt id (denormalized for query).
    NERVE_ROOT: "."
    NERVE_REPO: "z23cc/nerve-workstation"
    NERVE_INSTALL: >-
      if command -v nerve >/dev/null 2>&1; then :;
      elif [ -f Cargo.toml ] && grep -q nerve-workstation Cargo.toml; then
        cargo install --path crates/nerve-workstation --bin nerve --locked --force;
      else
        cargo install nerve-workstation --bin nerve --locked --force;
      fi
  # A merge lands as a push to the default branch — record the outcome there.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - set -euo pipefail
    - test -n "$NERVE_RUN_ID" || { echo "NERVE_RUN_ID is required"; exit 1; }
    - eval "$NERVE_INSTALL"
    - command -v nerve >/dev/null 2>&1 || { echo "nerve not installed"; exit 1; }
    # Record the REAL outcome (advisory; --source ci asserts CI witnessed the merge).
    - |
      OUTCOME_ARGS="outcome $NERVE_OUTCOME --run $NERVE_RUN_ID --source ci --root $NERVE_ROOT"
      if [ -n "$NERVE_RECEIPT" ]; then OUTCOME_ARGS="$OUTCOME_ARGS --receipt $NERVE_RECEIPT"; fi
      echo "+ nerve $OUTCOME_ARGS"
      nerve $OUTCOME_ARGS
